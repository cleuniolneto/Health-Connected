<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Minha Saúde - Dr.Click</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #32cd32, #0077b6);
      color: #fff;
    }

    header { display: flex; justify-content: flex-end; padding: 15px; }

     /* Menu hambúrguer */
     .menu-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      cursor: pointer;
      z-index: 1000;
    }

    .menu-btn div {
      width: 30px;
      height: 4px;
      background: white;
      margin: 6px 0;
      border-radius: 5px;
    }

   /* Menu lateral */
  .side-menu {
    position: fixed;
    top: 0;
    right: 0;
    width: 250px;
    height: 100%;
    background: rgba(0, 0, 0, 0.95);
    padding: 20px;
    transition: transform 0.3s ease-in-out;
    transform: translateX(100%); /* Escondido fora da tela */
    z-index: 999;
  }

  .side-menu.open {
    transform: translateX(0); /* Entra suavemente */
  }
    .side-menu.open {
      right: 0;
    }

    .side-menu h3 {
      margin-bottom: 20px;
      border-bottom: 1px solid #7CFC00;
      padding-bottom: 10px;
      color: #7CFC00;
    }

    .side-menu button {
      display: block;
      width: 100%;
      margin: 10px 0;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #1E90FF;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .side-menu button:hover {
      background: #0066cc;
    }


    .container {
      max-width: 700px;
      margin: 40px auto;
      padding: 25px;
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }

    .form-group textarea {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      resize: none;
      height: 70px;
      outline: none;
    }

    .history-title {
      text-align: center;
      margin-top: 30px;
      font-weight: bold;
      font-size: 18px;
    }

    .history-list {
      margin-top: 15px;
      background: rgba(255,255,255,0.2);
      padding: 15px;
      border-radius: 10px;
    }

    .history-list div {
      background: rgba(0,0,0,0.3);
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .history-list button {
      background: red;
      border: none;
      color: white;
      padding: 5px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    input {
      width: 80%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    #addBtn {
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      background: #0077b6;
      color: #fff;
      cursor: pointer;
      font-weight: bold;
    }

    #addBtn:hover { background: #32cd32; }

    .back-btn {
      margin-top: 25px;
      padding: 14px 28px;
      border: none;
      background: #0077b6;
      color: #fff;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      font-size: 16px;
    }
    

    .back-btn:hover { background: #32cd32; }
    footer {
      text-align: center;
      padding: 15px;
      background: rgba(0, 0, 0, 0.7);
      color: #7CFC00;
      position: fixed;
      bottom: 0;
      width: 100%;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <header>
    <div class="hamburger" onclick="toggleMenu()">
      <div></div>
      <div></div>
      <div></div>
    </div> <!-- Botão Menu -->
  <div class="menu-btn" onclick="toggleMenu()">
    <div></div>
    <div></div>
    <div></div>
  </div>

  <!-- Menu lateral -->
<div class="side-menu" id="sideMenu">
  <h3>Menu</h3>
  <button onclick="window.location.href='HOME 2.html'">Home</button>
  <button onclick="window.location.href='PERFIL.html'">Perfil</button>
  <button onclick="window.location.href='CANDIDATAR.html'">Candidatar</button>
  <button onclick="window.location.href='CONSULTA.html'">Consulta</button>
  <button onclick="window.location.href='ASSISTIR.html'">Assistir</button>
  <button onclick="window.location.href='CONTACTAR.html'">Contactar</button>
  <button onclick="window.location.href='DADOS_GERAIS.html'">Dados Gerais</button>
  <button onclick="window.location.href='login.html'">SAIR</button>
</div>
  </header>
<div class="container">
  <h2 style="text-align:center;">Minha Saúde</h2>

  <div class="form-group">
    <label>Doenças existentes / Crônicas:</label>
    <textarea placeholder="Ex.: Diabetes, Asma..."></textarea>
  </div>

  <div class="form-group">
    <label>Medicamentos que toma atualmente:</label>
    <textarea placeholder="Ex.: Paracetamol, Ibuprofeno..."></textarea>
  </div>

  <div class="form-group">
    <label>Alergias:</label>
    <textarea placeholder="Ex.: Amendoim, Leite, Frutos do mar..."></textarea>
  </div>

  <p class="history-title">Histórico de Consultas</p>

  <div style="display:flex; gap:10px; margin-top:10px;">
    <input type="text" id="historyInput" placeholder="Ex.: Consulta cardiologia 12/10/2025">
    <button id="addBtn" onclick="addHistory()">Adicionar</button>
  </div>

  <div class="history-list" id="historyList"></div>

  <button class="back-btn" onclick="window.location.href='HOME 2.html'">Voltar ao Home</button>
</div>
<footer>
  Since 2025 © Dr.Click
</footer>

<script>
const token = localStorage.getItem("token");
if(!token) window.location.href = "login.html";
 // Menu lateral
 function toggleMenu() {
    document.getElementById("sideMenu").classList.toggle("open");
   }

function addHistory() {
  let text = document.getElementById('historyInput').value;
  if(text.trim() === "") return;

  let list = document.getElementById('historyList');
  let item = document.createElement("div");

  item.innerHTML = `${text} <button onclick="this.parentElement.remove()">X</button>`;
  list.appendChild(item);

  document.getElementById('historyInput').value = "";
}
</script>

</body>
</html>
